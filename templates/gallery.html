<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gallery View</title>
  <link rel="stylesheet" href="/static/output.css"/>
</head>
<body class="bg-sky-200">
  <div class="max-w-6xl mx-auto">
    <header class="bg-white bg-opacity-95 p-4 rounded-lg shadow-lg my-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">Gallery</h1>
      <div class="flex flex-wrap gap-8 mt-4">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold text-indigo-600" id="totalCount">0</span>
          <span class="text-gray-600 text-sm">Total Files</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold text-indigo-600" id="imageCount">0</span>
          <span class="text-gray-600 text-sm">Images</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold text-indigo-600" id="videoCount">0</span>
          <span class="text-gray-600 text-sm">Videos</span>
        </div>
      </div>

      <div class="flex flex-wrap gap-3 mt-6">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="image">Images</button>
        <button class="filter-btn" data-filter="video">Videos</button>
      </div>
    </header>

    <!-- Gallery Grid -->
    <div class="bg-white bg-opacity-95 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4
      rounded-lg shadow-lg mb-8 gap-4 p-4" id="gallery">
    </div>

    <!-- if Empty -->
    <div id="emptyState" class="hidden text-center py-20 bg-white bg-opacity-95 rounded-lg text-gray-400">
      <div class="text-5xl mb-6">📁</div>
      <h2 class="text-xl font-semibold mb-2">No media files found</h2>
      <p>Please add images or videos to the 'media' folder</p>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal"
  class="hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex
  items-center justify-center p-5 modal-content">
    <!-- Previous Button -->
    <button class="modal-nav prev absolute left-5 top-1/2 -translate-y-1/2
    w-14 h-14 text-slate-300 hover:text-slate-50 rounded-full
    flex items-center justify-center text-4xl font-bold transition-all"
    onclick="prevMedia()">
      <
    </button>
    <!-- Next Button -->
    <button class="modal-nav next absolute right-5 top-1/2 -translate-y-1/2
    w-14 h-14 text-slate-300 hover:text-slate-50 rounded-full
    flex items-center justify-center text-4xl font-bold transition-all"
    onclick="nextMedia()">
      >
    </button>
    <!-- Close Button -->
    <button class="modal-close absolute top-5 right-6 w-12 h-12
    text-slate-300 hover:text-slate-50 rounded-full flex items-center justify-center
    text-5xl transition-all">
      &times;
    </button>

    <!-- Media Container -->
    <div id="modalMediaContainer" class="flex items-center justify-center max-h-[95vh]">
    <!-- Image or Video will be inserted here -->
    </div>

    <!-- File Info -->
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white
    px-6 py-4 rounded-lg text-sm">
      <span id="modalFileName"></span>
      (<span id="modalFileIndex">1</span>/<span id="modalFileTotal">1</span>)
    </div>
  </div>

<script>
  window.mediaFiles = {{ files | tojson }}
</script>
<script type="module" src="/static/js/main.js">
</script>
</body>
</html>
